<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心理测评</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family:system-ui,"Microsoft YaHei",sans-serif; background:#eef0f6; }
  .header { background:#fff; padding:14px 20px; border-bottom:1px solid #e5e7eb;
            display:flex; justify-content:space-between; align-items:center; }
  .header h1 { font-size:18px; margin:0; }
  .header .sub { font-size:12px; color:#888; }
  .progress { font-size:13px; color:#666; }
  .back-btn { border:none; background:#f1f1f4; color:#555;
              padding:8px 14px; border-radius:8px; font-size:14px; cursor:pointer; }
  .back-btn:hover { background:#e2e2ea; }

  /* 选择页 */
  #pickView { max-width:560px; margin:60px auto; text-align:center; padding:0 16px; }
  #pickView h2 { font-size:20px; color:#333; }
  .scale-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:28px; }
  .scale-btn { padding:22px; border:none; border-radius:14px; background:#fff;
               font-size:16px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.06);
               transition:.15s; }
  .scale-btn:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,.12); }
  .scale-btn small { display:block; color:#999; font-size:12px; margin-top:6px; }

  /* 聊天页 */
  #chatView { display:none; max-width:640px; margin:0 auto; height:100vh;
              flex-direction:column; }
  #messages { flex:1; overflow-y:auto; padding:20px; }
  .msg { margin:10px 0; display:flex; }
  .msg.bot  { justify-content:flex-start; }
  .msg.user { justify-content:flex-end; }
  .bubble { max-width:75%; padding:12px 16px; border-radius:14px; line-height:1.5; }
  .bot  .bubble { background:#fff; color:#333; }
  .user .bubble { background:#6366f1; color:#fff; }
  .crisis { text-align:center; color:#d33; font-weight:bold; padding:10px; }
  .inputbar { display:flex; padding:14px; background:#fff; border-top:1px solid #e5e7eb; }
  .inputbar input { flex:1; padding:12px; border:1px solid #ddd; border-radius:10px; font-size:15px; }
  .inputbar button { margin-left:10px; padding:0 22px; border:none; border-radius:10px;
                     background:#6366f1; color:#fff; font-size:15px; cursor:pointer; }
  .inputbar button:disabled { background:#aaa; cursor:not-allowed; }
</style>
</head>
<body>

<!-- ===== 选择页 ===== -->
<div id="pickView">
  <h2>请选择测评量表</h2>
  <div class="scale-grid">
    <button class="scale-btn" data-id="SAS">SAS<small>焦虑自评量表</small></button>
    <button class="scale-btn" data-id="SDS">SDS<small>抑郁自评量表</small></button>
    <button class="scale-btn" data-id="PHQ9">PHQ-9<small>抑郁筛查</small></button>
    <button class="scale-btn" data-id="GAD7">GAD-7<small>焦虑筛查</small></button>
  </div>
</div>

<!-- ===== 聊天页 ===== -->
<div id="chatView">
  <div class="header">
    <div style="display:flex; align-items:center; gap:10px;">
      <button id="backBtn" class="back-btn">← 返回</button>
      <div>
        <h1 id="scaleName">心理测评</h1>
        <div class="sub">情绪筛查 · 非医学诊断</div>
      </div>
    </div>
    <div class="progress" id="progress"></div>
  </div>
  <div id="messages"></div>
  <div class="inputbar">
    <input id="input" placeholder="输入你的回答…" autocomplete="off">
    <button id="sendBtn">发送</button>
  </div>
</div>

<script>
let sessionId = null;
let totalItems = 0;
let finished = false;

const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('input');
const sendBtn    = document.getElementById('sendBtn');

function addMsg(text, who) {
  const div = document.createElement('div');
  div.className = 'msg ' + who;
  div.innerHTML = `<div class="bubble"></div>`;
  div.querySelector('.bubble').textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function addCrisis(text) {
  const div = document.createElement('div');
  div.className = 'crisis';
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function setProgress(n) {
  document.getElementById('progress').textContent =
    totalItems ? `${n} / ${totalItems}` : '';
}

// —— 返回主页 ——
function backToHome() {
  if (sessionId && !finished) {
    if (!confirm('返回主页将结束当前测评，确定吗？')) return;
  }
  sessionId  = null;
  totalItems = 0;
  finished   = false;
  messagesEl.innerHTML = '';
  inputEl.value = '';
  sendBtn.disabled = false;
  document.getElementById('progress').textContent = '';
  document.getElementById('chatView').style.display = 'none';
  document.getElementById('pickView').style.display = 'block';
}
document.getElementById('backBtn').addEventListener('click', backToHome);

// —— 选量表 → 建会话 ——
document.querySelectorAll('.scale-btn').forEach(btn => {
  btn.addEventListener('click', async () => {
    const scaleId = btn.dataset.id;           // 必须与 JSON 文件名一致(大小写)
    try {
      const res = await fetch('/api/session', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ scale_id: scaleId }),
      });
      const data = await res.json();
      if (!res.ok || data.error) { alert(data.error || '量表加载失败'); return; }

      sessionId  = data.session_id;
      totalItems = data.total_items;
      finished   = false;
      sendBtn.disabled = false;
      document.getElementById('scaleName').textContent = data.scale_name;
      document.getElementById('pickView').style.display = 'none';
      document.getElementById('chatView').style.display = 'flex';
      setProgress(0);
      addMsg(data.reply, 'bot');
      inputEl.focus();
    } catch (e) { alert('网络错误：' + e.message); }
  });
});

// —— 发送一轮 ——
async function send() {
  const text = inputEl.value.trim();
  if (!text || finished || !sessionId) return;
  addMsg(text, 'user');
  inputEl.value = '';
  sendBtn.disabled = true;
  try {
    const res = await fetch(`/api/session/${sessionId}/turn`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text }),
    });
    const data = await res.json();
    if (!res.ok || data.error) { addMsg(data.error || '出错了', 'bot'); return; }

    if (data.reply) addMsg(data.reply, 'bot');
    setProgress(data.answered_count);

    if (data.status === 'completed') {
      finished = true;
      const r = data.score_result;
      if (r) addMsg(`测评完成。总分 ${r.total_score ?? r.score ?? ''}，${r.severity_label ?? r.level ?? ''}`, 'bot');
    } else if (data.status === 'crisis' || data.status === 'terminated') {
      finished = true;
      addCrisis('已转入危机关怀，测评中断');
    }
  } catch (e) {
    addMsg('网络错误：' + e.message, 'bot');
  } finally {
    sendBtn.disabled = finished;
  }
}

sendBtn.addEventListener('click', send);
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
</script>
</body>
</html>
