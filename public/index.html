<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心理测评</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family:system-ui,"Microsoft YaHei",sans-serif; background:#eef0f6; height: 100vh; display: flex; flex-direction: column; }
  .header { background:#fff; padding:14px 20px; border-bottom:1px solid #e5e7eb; display:flex; justify-content:space-between; align-items:center; }
  .header h1 { font-size:18px; margin:0; }
  .header .sub { font-size:12px; color:#888; }
  .progress { font-size:13px; color:#666; }
  .back-btn { border:none; background:#f1f1f4; color:#555; padding:8px 14px; border-radius:8px; font-size:14px; cursor:pointer; }
  
  /* 选择页 */
  #pickView { max-width:560px; margin:60px auto; text-align:center; padding:0 16px; width: 100%; }
  .scale-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:28px; }
  .scale-btn { padding:22px; border:none; border-radius:14px; background:#fff; font-size:16px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.06); }
  
  /* 聊天页 */
  #chatView { display:none; max-width:640px; margin:0 auto; width:100%; flex:1; flex-direction:column; overflow:hidden; }
  #messages { flex:1; overflow-y:auto; padding:20px; }
  .msg { margin:10px 0; display:flex; }
  .msg.bot { justify-content:flex-start; }
  .msg.user { justify-content:flex-end; }
  .bubble { max-width:75%; padding:12px 16px; border-radius:14px; line-height:1.5; }
  .bot .bubble { background:#fff; color:#333; }
  .user .bubble { background:#6366f1; color:#fff; }
  
  /* 选项栏样式 */
  #optionsBar { padding:10px 20px; display:flex; gap:8px; flex-wrap:wrap; background:#f9fafb; border-top:1px solid #e5e7eb; }
  .opt-btn { padding:8px 12px; border:1px solid #6366f1; background:#fff; color:#6366f1; border-radius:8px; cursor:pointer; font-size:13px; flex:1; white-space: nowrap; }
  .opt-btn:hover { background:#6366f1; color:#fff; }
  
  .inputbar { display:flex; padding:14px; background:#fff; border-top:1px solid #e5e7eb; }
  .inputbar input { flex:1; padding:12px; border:1px solid #ddd; border-radius:10px; font-size:15px; }
  .inputbar button { margin-left:10px; padding:0 22px; border:none; border-radius:10px; background:#6366f1; color:#fff; cursor:pointer; }
</style>
</head>
<body>

<div id="pickView">
  <h2>请选择测评量表</h2>
  <div class="scale-grid">
    <button class="scale-btn" data-id="SAS">SAS<br><small>焦虑自评</small></button>
    <button class="scale-btn" data-id="SDS">SDS<br><small>抑郁自评</small></button>
    <button class="scale-btn" data-id="PHQ9">PHQ-9<br><small>抑郁筛查</small></button>
    <button class="scale-btn" data-id="GAD7">GAD-7<br><small>焦虑筛查</small></button>
  </div>
</div>

<div id="chatView">
  <div class="header">
    <div style="display:flex; align-items:center; gap:10px;">
      <button id="backBtn" class="back-btn">← 返回</button>
      <div><h1 id="scaleName">心理测评</h1><div class="sub">情绪筛查 · 非医学诊断</div></div>
    </div>
    <div class="progress" id="progress"></div>
  </div>
  <div id="messages"></div>
  
  <div id="optionsBar">
    <button class="opt-btn">完全没有</button>
    <button class="opt-btn">有几天</button>
    <button class="opt-btn">一半以上时间</button>
    <button class="opt-btn">几乎每天</button>
  </div>

  <div class="inputbar">
    <input id="input" placeholder="输入你的回答…" autocomplete="off">
    <button id="sendBtn">发送</button>
  </div>
</div>

<script>
let sessionId = null, finished = false;
const inputEl = document.getElementById('input'), 
      sendBtn = document.getElementById('sendBtn'),
      messagesEl = document.getElementById('messages'),
      optionsBar = document.getElementById('optionsBar');

// 1. 返回按钮逻辑：重置一切
document.getElementById('backBtn').addEventListener('click', () => {
    document.getElementById('chatView').style.display = 'none';
    document.getElementById('pickView').style.display = 'block';
    messagesEl.innerHTML = '';
    sessionId = null;
    finished = false;
    optionsBar.style.display = 'flex';
    sendBtn.disabled = false;
});

// 2. 选项点击逻辑
document.querySelectorAll('.opt-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    inputEl.value = btn.textContent;
    send();
  });
});

async function send() {
  const text = inputEl.value.trim();
  if (!text || finished || !sessionId) return;
  addMsg(text, 'user');
  inputEl.value = '';
  sendBtn.disabled = true;
  try {
    const res = await fetch(`/api/session/${sessionId}/turn`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text }),
    });
    const data = await res.json();
    if (data.reply) addMsg(data.reply, 'bot');
    if (data.status === 'completed') {
      finished = true;
      optionsBar.style.display = 'none';
      if(data.score_result) addMsg(`测评完成：${data.score_result.severity_label}`, 'bot');
    }
  } catch (e) { alert('网络错误'); } finally { sendBtn.disabled = finished; }
}

function addMsg(text, who) {
  const div = document.createElement('div');
  div.className = `msg ${who}`;
  div.innerHTML = `<div class="bubble">${text}</div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

sendBtn.addEventListener('click', send);
document.querySelectorAll('.scale-btn').forEach(btn => {
  btn.addEventListener('click', async () => {
    const res = await fetch('/api/session', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({scale_id: btn.dataset.id})});
    const data = await res.json();
    sessionId = data.session_id;
    document.getElementById('scaleName').innerText = data.scale_name || '心理测评';
    document.getElementById('pickView').style.display = 'none';
    document.getElementById('chatView').style.display = 'flex';
    addMsg(data.reply, 'bot');
  });
});
</script>
</body>
</html>
